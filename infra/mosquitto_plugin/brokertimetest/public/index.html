<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Broker Response Time Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; }
        .config-panel { background: #16213e; padding: 30px; border-radius: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #00d9ff; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #0f3460; background: #0f3460; color: #fff; border-radius: 5px; font-size: 16px; }
        input:focus { outline: none; border-color: #00d9ff; }
        .btn { background: #00d9ff; color: #1a1a2e; padding: 15px 40px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #00b8d4; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .results-panel { background: #16213e; padding: 30px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .log-area { background: #0f3460; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; margin-bottom: 20px; font-family: monospace; font-size: 14px; }
        .log-line { margin-bottom: 5px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: #0f3460; padding: 20px; border-radius: 5px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #00d9ff; }
        .stat-label { margin-top: 5px; color: #aaa; }
        .results-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .results-table th, .results-table td { padding: 12px; text-align: left; border-bottom: 1px solid #0f3460; }
        .results-table th { background: #0f3460; color: #00d9ff; }
        .results-table tr:hover { background: #0f3460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MQTT Broker Response Time Tester</h1>
        
        <div class="config-panel">
            <h2 style="margin-bottom: 20px; color: #00d9ff;">Configuração</h2>
            <div class="form-group">
                <label>Endereço do Broker MQTT</label>
                <input type="text" id="host" value="localhost">
            </div>
            <div class="form-group">
                <label>Porta</label>
                <input type="number" id="port" value="1883">
            </div>
            <div class="form-group">
                <label>Prefixo dos Clientes</label>
                <input type="text" id="clientPrefix" value="clienteexemplo">
            </div>
            <div class="form-group">
                <label>Quantidade de Clientes Paralelos</label>
                <input type="number" id="numClients" value="3" min="1">
            </div>
            <div class="form-group">
                <label>Iterações por Cliente</label>
                <input type="number" id="numIterations" value="4" min="1">
            </div>
            <button class="btn" id="startBtn">Iniciar Teste</button>
        </div>

        <div class="results-panel" id="resultsPanel">
            <h2 style="margin-bottom: 20px; color: #00d9ff;">Resultados</h2>
            <div class="log-area" id="logArea"></div>
            
            <div class="stats" id="statsArea" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="totalMessages">0</div>
                    <div class="stat-label">Total de Mensagens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgLatency">0ms</div>
                    <div class="stat-label">Latência Média</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="minLatency">0ms</div>
                    <div class="stat-label">Latência Mínima</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="maxLatency">0ms</div>
                    <div class="stat-label">Latência Máxima</div>
                </div>
            </div>

            <table class="results-table" id="resultsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Iteração</th>
                        <th>Latência (ms)</th>
                        <th>DiffTime (ms)</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const resultsPanel = document.getElementById('resultsPanel');
        const logArea = document.getElementById('logArea');
        const statsArea = document.getElementById('statsArea');
        const resultsTable = document.getElementById('resultsTable');
        const resultsBody = document.getElementById('resultsBody');

        let ws;

        startBtn.addEventListener('click', () => {
            const config = {
                action: 'start',
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value),
                clientPrefix: document.getElementById('clientPrefix').value,
                numClients: parseInt(document.getElementById('numClients').value),
                numIterations: parseInt(document.getElementById('numIterations').value)
            };

            resultsPanel.style.display = 'block';
            logArea.innerHTML = '';
            resultsBody.innerHTML = '';
            statsArea.style.display = 'none';
            resultsTable.style.display = 'none';
            startBtn.disabled = true;

            ws = new WebSocket('ws://localhost:3000');

            ws.onopen = () => {
                ws.send(JSON.stringify(config));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'log') {
                    logArea.innerHTML += `<div class="log-line">${msg.message}</div>`;
                    logArea.scrollTop = logArea.scrollHeight;
                } else if (msg.type === 'result') {
                    const { client, iteration, latency, diffTime } = msg.data;
                    const row = `<tr>
                        <td>${client}</td>
                        <td>${iteration}</td>
                        <td>${latency}</td>
                        <td>${diffTime}</td>
                    </tr>`;
                    resultsBody.innerHTML += row;
                    resultsTable.style.display = 'table';
                } else if (msg.type === 'stats') {
                    document.getElementById('totalMessages').textContent = msg.data.total;
                    document.getElementById('avgLatency').textContent = msg.data.avg + 'ms';
                    document.getElementById('minLatency').textContent = msg.data.min + 'ms';
                    document.getElementById('maxLatency').textContent = msg.data.max + 'ms';
                    statsArea.style.display = 'grid';
                } else if (msg.type === 'complete') {
                    logArea.innerHTML += `<div class="log-line" style="color: #00ff00;">✓ Teste concluído!</div>`;
                    startBtn.disabled = false;
                } else if (msg.type === 'error') {
                    logArea.innerHTML += `<div class="log-line" style="color: #ff0000;">✗ Erro: ${msg.message}</div>`;
                    startBtn.disabled = false;
                }
            };

            ws.onerror = () => {
                logArea.innerHTML += `<div class="log-line" style="color: #ff0000;">✗ Erro de conexão com o servidor</div>`;
                startBtn.disabled = false;
            };
        });
    </script>
</body>
</html>
