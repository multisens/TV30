version: '3.8'

services:
  validation-middleware:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: validation-middleware
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-0123456789}
      - JWT_ISSUER=${JWT_ISSUER:-GenericIssuer}
      - PORT=3000
      - KRAKEND_CONFIG=/etc/krakend/krakend.json
    volumes:
      - ../krakenD_external/krakend.json:/etc/krakend/krakend.json:ro
    restart: unless-stopped
    networks:
      - ginga_net

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    ports:
      - "8085:8080"
    environment:
      - URL=http://localhost:3000/openapi.json
      - CORS=true
    restart: unless-stopped
    networks:
      - ginga_net

networks:
  ginga_net:
    external: true
    name: ginga_net
